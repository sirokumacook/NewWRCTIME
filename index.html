<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WRC Studio Ultra: High-Bitrate Engine</title>
    <style>
        :root { --wrc-orange: #FF4D00; }
        * { box-sizing: border-box; font-family: "Helvetica Neue", Arial, sans-serif; -webkit-font-smoothing: antialiased; }
        body { margin: 0; background: #000; color: white; display: flex; height: 100vh; overflow: hidden; }

        /* --- Editor Panel --- */
        #editor-panel { width: 460px; height: 100vh; background: #151515; border-right: 2px solid #333; display: flex; flex-direction: column; z-index: 1000; flex-shrink: 0; overflow-y: auto; }
        .editor-content { padding: 20px; }
        .editor-section { margin-bottom: 15px; background: #222; padding: 12px; border-radius: 8px; border: 1px solid #333; }
        label.asset-label { display: block; font-size: 11px; color: #0ff; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        
        input[type="text"], input[type="number"], input[type="range"] { 
            width: 100%; background: #000; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; font-size: 13px; margin-top: 4px; 
        }
        .flex-row { display: flex; gap: 10px; align-items: center; margin-top: 5px; }
        .flex-row label { font-size: 12px; color: #ccc; min-width: 80px; }

        button.btn { background: var(--wrc-orange); color: white; border: none; padding: 12px; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.2s; }
        button.btn:hover { background: #ff6a00; transform: translateY(-1px); }
        button.btn-sm { background: #333; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }

        /* --- Display Area --- */
        #display-area { flex-grow: 1; display: flex; justify-content: center; align-items: center; background: #080808; position: relative; }
        canvas { background: #000; box-shadow: 0 0 60px rgba(0,0,0,0.9); max-width: 95%; max-height: 95%; }
        
        #status-badge { position: absolute; top: 30px; right: 30px; background: rgba(221, 0, 0, 0.9); padding: 10px 20px; border-radius: 5px; font-weight: bold; display: none; z-index: 2000; }

        /* Row Controls */
        .row-item { display: flex; gap: 5px; align-items: center; margin-bottom: 8px; padding: 8px; background: #2a2a2a; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="editor-panel">
        <div style="padding:20px; border-bottom:1px solid #333;"><h2 style="margin:0; color:var(--wrc-orange); font-size:1.2rem; letter-spacing: 1px;">WRC STUDIO ULTRA <span style="font-size: 0.7rem; color: #888;">60FPS</span></h2></div>
        <div class="editor-content">
            
            <div class="editor-section">
                <label class="asset-label">Files & Assets</label>
                <div class="flex-row"><label>BG Video</label><input type="file" id="v-up" accept="video/mp4"></div>
                <div class="flex-row"><label>Audio</label><input type="file" id="a-up" accept=".mp3"></div>
                <div class="flex-row"><label>Font</label><input type="file" id="f-up" accept=".ttf,.otf"></div>
            </div>

            <div class="editor-section">
                <label class="asset-label">Animation Settings</label>
                <div class="flex-row">
                    <label>Speed (sec)</label>
                    <input type="range" id="anim-speed" min="0.1" max="2.0" step="0.1" value="0.5" oninput="this.nextElementSibling.value = this.value">
                    <output style="font-size:12px; width:30px;">0.5</output>
                </div>
                <div class="flex-row">
                    <label>Keep (sec)</label>
                    <input type="number" id="keep-time" value="5" min="1" style="width:70px;">
                </div>
                <div class="flex-row">
                    <label>BG Opacity</label>
                    <input type="range" id="bg-opacity" min="0" max="100" value="95" oninput="this.nextElementSibling.value = this.value + '%'">
                    <output style="font-size:12px; width:30px;">95%</output>
                </div>
            </div>

            <div class="editor-section">
                <label class="asset-label">Schedule Content</label>
                <input type="text" id="in-title" value="WRC RALLY SWEDEN" style="margin-bottom: 10px;">
                <div id="rows-editor"></div>
                <div style="display:flex; gap:5px; margin-top:10px;">
                    <button class="btn-sm" onclick="addRow('day')" style="flex:1;">+ DATE</button>
                    <button class="btn-sm" onclick="addRow('stage')" style="flex:1;">+ STAGE</button>
                </div>
            </div>

            <button class="btn" id="rec-button" onclick="startExport()" style="background:#d00;">🔴 EXPORT 1080p / 60fps</button>
            <button class="btn" onclick="triggerPreview()" style="background:#444;">▶ PREVIEW SEQUENCE</button>
        </div>
    </div>

    <div id="display-area">
        <div id="status-badge">🔴 RECORDING 60FPS...</div>
        <canvas id="render-canvas" width="1920" height="1080"></canvas>
    </div>

    <video id="bg-video" loop muted playsinline style="display:none;"></video>

    <script>
        let data = [
            { type: 'day', text: 'THURSDAY 15 FEB' },
            { type: 'stage', day: "19:01", time: "Umeå Sprint 1" },
            { type: 'day', text: 'FRIDAY 16 FEB' }
        ];

        const canvas = document.getElementById('render-canvas');
        const ctx = canvas.getContext('2d');
        const bgVideo = document.getElementById('bg-video');
        
        let currentFont = "sans-serif";
        let animState = 'idle'; // hidden, in, idle, out
        let animStartTime = 0;
        let isRecording = false;

        // 60fps用のタイマー管理
        function draw(now) {
            render(now);
            requestAnimationFrame(draw);
        }

        function render(now) {
            ctx.clearRect(0, 0, 1920, 1080);
            
            // 背景動画の描画（不透明度調整なしの生映像）
            if (bgVideo.readyState >= 2) {
                const vScale = Math.max(1920 / bgVideo.videoWidth, 1080 / bgVideo.videoHeight);
                const vw = bgVideo.videoWidth * vScale;
                const vh = bgVideo.videoHeight * vScale;
                ctx.drawImage(bgVideo, (1920 - vw)/2, (1080 - vh)/2, vw, vh);
            } else {
                ctx.fillStyle = "#050a10"; ctx.fillRect(0,0,1920,1080);
            }

            // 全体的な暗調
            ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.fillRect(0,0,1920,1080);

            if (animState !== 'hidden') drawUI(now);
        }

        function drawUI(now) {
            const uiW = 1350, uiH = 720;
            const x = (1920 - uiW) / 2, y = (1080 - uiH) / 2;
            const opacity = document.getElementById('bg-opacity').value / 100;
            const speed = parseFloat(document.getElementById('anim-speed').value) * 1000;
            const stagger = 80;

            let gAlpha = 1;
            if (animState === 'in') gAlpha = Math.min(1, (now - animStartTime) / 200);
            if (animState === 'out') {
                const totalDur = (data.length * stagger) + speed;
                if (now - animStartTime > totalDur - 200) gAlpha = Math.max(0, 1 - ((now - animStartTime - (totalDur - 200)) / 200));
            }
            ctx.globalAlpha = gAlpha;

            // ベース板
            ctx.fillStyle = `rgba(5, 15, 35, ${opacity})`;
            ctx.fillRect(x, y, uiW, uiH);
            ctx.fillStyle = varColor('--wrc-orange');
            ctx.fillRect(x, y, 18, uiH);

            let curY = y + 45;
            const rows = [{type:'header', title: document.getElementById('in-title').value}, ...data];

            rows.forEach((row, i) => {
                const delay = i * stagger;
                let p = 1;
                if (animState === 'in') p = easeOut(Math.max(0, Math.min(1, (now - animStartTime - delay) / speed)));
                if (animState === 'out') p = easeOut(Math.max(0, Math.min(1, (now - animStartTime - delay) / speed)));

                const rowH = row.type === 'header' ? 120 : (row.type === 'day' ? 40 : 50);
                const rowW = uiW - 100;
                const rowX = x + 50;

                ctx.save();
                // Clip Logic
                if (animState === 'in') {
                    ctx.beginPath(); ctx.rect(rowX, curY, rowW * p, rowH); ctx.clip();
                } else if (animState === 'out') {
                    ctx.beginPath(); ctx.rect(rowX + (rowW * p), curY, rowW * (1-p), rowH); ctx.clip();
                }

                // Draw Row
                if (row.type === 'header') {
                    ctx.fillStyle = varColor('--wrc-orange'); ctx.fillRect(rowX, curY, rowW, rowH);
                    ctx.fillStyle = "#fff"; ctx.textAlign = "center";
                    ctx.font = `italic 800 55px ${currentFont}`; // 太さを数値で指定し違和感を解消
                    ctx.fillText(row.title, rowX + rowW/2, curY + 75);
                } else {
                    ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(rowX, curY, rowW, rowH);
                    ctx.textAlign = "left";
                    if (row.type === 'day') {
                        ctx.fillStyle = "#aaa"; ctx.font = `800 16px ${currentFont}`;
                        ctx.fillText(row.text, rowX + 40, curY + 26);
                    } else {
                        ctx.fillStyle = varColor('--wrc-orange'); ctx.font = `900 24px ${currentFont}`;
                        ctx.fillText(row.day, rowX + 40, curY + 32);
                        ctx.fillStyle = "#fff"; ctx.font = `700 24px ${currentFont}`;
                        ctx.fillText(row.time, rowX + 160, curY + 32);
                    }
                }
                ctx.restore();

                // Wipe Bar
                if (p > 0 && p < 1) {
                    ctx.fillStyle = row.type === 'header' ? "#fff" : varColor('--wrc-orange');
                    const wX = animState === 'in' ? rowX + (rowW * p) - 100 : rowX + (rowW * p);
                    ctx.save();
                    ctx.beginPath(); ctx.rect(rowX, curY, rowW, rowH); ctx.clip();
                    ctx.fillRect(wX, curY, 150, rowH);
                    ctx.restore();
                }
                curY += rowH + (row.type === 'header' ? 25 : 10);
            });
            ctx.globalAlpha = 1;
        }

        function easeOut(t) { return 1 - Math.pow(1 - t, 3); }
        function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

        // --- Recording & Export ---
        async function startExport() {
            if (isRecording) return;
            const keep = parseInt(document.getElementById('keep-time').value) * 1000;
            const speed = parseFloat(document.getElementById('anim-speed').value) * 1000;
            const stagger = 80;
            const totalAnimTime = (data.length * stagger) + speed;

            isRecording = true;
            document.getElementById('status-badge').style.display = 'block';
            
            // Audio Mix
            const audioCtx = new AudioContext();
            const dest = audioCtx.createMediaStreamDestination();
            const gain = audioCtx.createGain();
            gain.connect(dest);
            
            const aFile = document.getElementById('a-up').files[0];
            let audioNode;
            if (aFile) {
                const audio = new Audio(URL.createObjectURL(aFile));
                await audio.play(); audio.pause();
                audio.currentTime = Math.random() * Math.max(0, audio.duration - 20);
                audioNode = audio;
                const source = audioCtx.createMediaElementSource(audio);
                source.connect(gain);
            }

            // Stream Capture (60fps)
            const stream = canvas.captureStream(60);
            dest.stream.getAudioTracks().forEach(t => stream.addTrack(t));

            // WebM/VP9 50Mbps (MP4互換性の高い設定)
            const recorder = new MediaRecorder(stream, {
                mimeType: 'video/webm;codecs=vp9',
                videoBitsPerSecond: 50000000 // 50Mbps
            });

            const chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'WRC_Studio_Pro_60fps.webm'; a.click();
                isRecording = false;
                document.getElementById('status-badge').style.display = 'none';
                animState = 'idle';
                if(audioNode) audioNode.pause();
                audioCtx.close();
            };

            recorder.start();
            bgVideo.play();
            
            // Sequence
            animState = 'hidden'; await wait(5000);
            
            animState = 'in'; animStartTime = performance.now();
            if(audioNode) { audioNode.play(); gain.gain.setTargetAtTime(1, audioCtx.currentTime, 0.5); }
            await wait(totalAnimTime);
            
            animState = 'idle'; await wait(keep);
            
            animState = 'out'; animStartTime = performance.now();
            if(audioNode) gain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5);
            await wait(totalAnimTime);
            
            animState = 'hidden'; await wait(5000);
            recorder.stop();
        }

        function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

        // --- Utils ---
        function addRow(t) {
            data.push(t === 'day' ? {type:'day', text:'NEW DATE'} : {type:'stage', day:'00:00', time:'New Stage'});
            buildEditor();
        }

        function buildEditor() {
            const root = document.getElementById('rows-editor');
            root.innerHTML = data.map((item, i) => `
                <div class="row-item">
                    ${item.type === 'day' 
                        ? `<input type="text" value="${item.text}" oninput="data[${i}].text=this.value">`
                        : `<input style="width:60px" type="text" value="${item.day}" oninput="data[${i}].day=this.value">
                           <input type="text" value="${item.time}" oninput="data[${i}].time=this.value">`}
                    <button class="btn-sm" onclick="move(${i},-1)">↑</button>
                    <button class="btn-sm" onclick="move(${i},1)">↓</button>
                    <button class="btn-sm" style="color:red" onclick="data.splice(${i},1);buildEditor()">×</button>
                </div>
            `).join('');
        }

        function move(i, d) {
            if(i+d < 0 || i+d >= data.length) return;
            [data[i], data[i+d]] = [data[i+d], data[i]];
            buildEditor();
        }

        function triggerPreview() {
            animState = 'in'; animStartTime = performance.now();
            const speed = parseFloat(document.getElementById('anim-speed').value) * 1000;
            const keep = parseInt(document.getElementById('keep-time').value) * 1000;
            setTimeout(() => {
                animState = 'idle';
                setTimeout(() => {
                    animState = 'out'; animStartTime = performance.now();
                    setTimeout(() => { animState = 'idle'; }, (data.length*80)+speed + 500);
                }, keep);
            }, (data.length*80)+speed);
        }

        document.getElementById('v-up').onchange = e => { if(e.target.files[0]) bgVideo.src = URL.createObjectURL(e.target.files[0]); bgVideo.play(); };
        document.getElementById('f-up').onchange = async e => {
            const f = e.target.files[0];
            if(f) {
                const name = 'CustomFont' + Date.now();
                const font = new FontFace(name, await f.arrayBuffer());
                await font.load(); document.fonts.add(font);
                currentFont = name;
            }
        };

        buildEditor();
        requestAnimationFrame(draw);
    </script>
</body>
</html>
