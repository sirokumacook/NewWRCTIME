<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WRC Studio Pro: Broadcast Engine</title>
    <style>
        :root { --wrc-orange: #FF4D00; }
        * { box-sizing: border-box; font-family: 'Arial Black', sans-serif; -webkit-font-smoothing: antialiased; }
        body { margin: 0; background: #000; color: white; display: flex; height: 100vh; overflow: hidden; }

        /* --- Editor Panel --- */
        #editor-panel { width: 440px; height: 100vh; background: #1a1a1a; border-right: 2px solid #333; display: flex; flex-direction: column; z-index: 1000; flex-shrink: 0; }
        .editor-content { flex-grow: 1; overflow-y: auto; padding: 20px; }
        .editor-section { margin-bottom: 12px; background: #2a2a2a; padding: 10px; border-radius: 6px; }
        label.asset-label { display: block; font-size: 10px; color: #0ff; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="number"] { width: 100%; background: #000; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; font-size: 12px; margin-top: 4px; }
        input[type="file"] { width: 100%; color: #888; font-size: 11px; margin-top: 5px; cursor: pointer; }
        
        button.btn { background: var(--wrc-orange); color: white; border: none; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 5px; transition: 0.2s; }
        button.btn:hover { opacity: 0.8; }
        button.btn-sm { background: #444; color: white; border: none; padding: 8px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
        button.btn-sm:hover { background: #666; }
        
        button.btn-rec { background: #d00; font-size: 14px; padding: 15px; margin-top: 10px; position: relative; overflow: hidden; }
        button.btn-rec:disabled { background: #444; cursor: not-allowed; }
        #rec-progress-bar { position: absolute; bottom: 0; left: 0; height: 4px; background: rgba(255,255,255,0.8); width: 0%; transition: width 0.1s linear; }
        
        /* --- Display Area --- */
        #display-area { flex-grow: 1; display: flex; justify-content: center; align-items: center; background: #0a0a0a; position: relative; overflow: hidden; }
        /* キャンバス自体の解像度は1920x1080固定、CSSで画面に収める */
        canvas { background: #000; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        
        #status-badge { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.7); padding: 8px 15px; border-radius: 4px; font-size: 12px; font-weight: bold; display: none; align-items: center; gap: 8px; z-index: 2000; border: 1px solid #333; }
        #status-icon { width: 10px; height: 10px; border-radius: 50%; background: red; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.2; } }
    </style>
</head>
<body>

    <div id="editor-panel">
        <div style="padding:20px; border-bottom:1px solid #333;"><h2 style="margin:0; color:var(--wrc-orange); font-size:1.1rem;">WRC STUDIO PRO</h2></div>
        <div class="editor-content">
            <div class="editor-section">
                <label class="asset-label">1. BACKGROUND VIDEO (.mp4)</label>
                <input type="file" id="v-up" accept="video/mp4">
            </div>
            <div class="editor-section">
                <label class="asset-label">2. AUDIO (.mp3 / .wav)</label>
                <input type="file" id="a-up" accept=".mp3, audio/mp3, audio/mpeg, audio/wav, audio/*">
            </div>
            <div class="editor-section">
                <label class="asset-label">3. CUSTOM FONT (.ttf / .otf)</label>
                <input type="file" id="f-up" accept=".ttf, .otf, font/ttf, font/otf">
            </div>
            <div class="editor-section" style="border-left: 3px solid #0ff;">
                <label class="asset-label">DISPLAY DURATION (UI表示秒数)</label>
                <input type="number" id="keep-time" value="7" min="1" style="width: 80px; display:inline-block;"> <span style="font-size:12px; color:#aaa;">秒キープ</span>
            </div>
            <div class="editor-section">
                <label style="font-size: 10px; color: #aaa; font-weight: bold;">RALLY TITLE</label>
                <input type="text" id="in-title" value="WRC RALLY SWEDEN" oninput="requestRender()">
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn" style="background:#0055ff; font-size:11px;" onclick="addRow('day')">+ ADD DATE</button>
                <button class="btn" style="font-size:11px;" onclick="addRow('stage')">+ ADD STAGE</button>
            </div>
            <div id="rows-editor" style="margin-top: 15px;"></div>
        </div>
        <div style="padding:20px; background:#111; border-top:1px solid #333;">
            <button class="btn btn-rec" id="rec-button" onclick="startExport()">
                <span id="rec-text">🔴 FULL HD EXPORT (.mp4)</span>
                <div id="rec-progress-bar"></div>
            </button>
            <button class="btn" id="preview-button" style="background:#444;" onclick="triggerPreview()">▶ PREVIEW SEQUENCE</button>
        </div>
    </div>

    <div id="display-area">
        <div id="status-badge"><div id="status-icon"></div><span id="status-text">REC</span></div>
        <canvas id="render-canvas" width="1920" height="1080"></canvas>
    </div>

    <video id="bg-video" loop muted playsinline style="display:none;"></video>
    
    <script>
        // --- データ状態 ---
        let data = [
            { type: 'day', text: 'THURSDAY 15 FEB' },
            { type: 'stage', day: "19:01", time: "Umeå Sprint 1" },
            { type: 'day', text: 'FRIDAY 16 FEB' },
            { type: 'stage', day: "08:58", time: "Brattby 1" }
        ];

        const canvas = document.getElementById('render-canvas');
        const ctx = canvas.getContext('2d');
        const bgVideo = document.getElementById('bg-video');
        
        let currentFont = "'Arial Black', sans-serif";
        let animState = 'idle'; // hidden, in, idle, out
        let animStartTime = 0;
        let isRecording = false;
        
        const SPEED = 550; // CSS版の wipe-speed
        const STAGGER = 80; // 行ごとの遅延

        function easeOutCubic(x) { return 1 - Math.pow(1 - x, 3); }

        // プレビューのサイズ調整 (内部解像度は1920x1080で固定)
        function resizeCanvas() {
            const pnl = document.getElementById('editor-panel');
            const availW = window.innerWidth - pnl.offsetWidth;
            const availH = window.innerHeight;
            const scale = Math.min(availW / 1920, availH / 1080) * 0.9;
            canvas.style.width = `${1920 * scale}px`;
            canvas.style.height = `${1080 * scale}px`;
        }

        // --- 描画エンジン ---
        function drawFrame(now) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (bgVideo.src && bgVideo.readyState >= 2) {
                const scale = Math.max(canvas.width / bgVideo.videoWidth, canvas.height / bgVideo.videoHeight);
                const w = bgVideo.videoWidth * scale;
                const h = bgVideo.videoHeight * scale;
                ctx.drawImage(bgVideo, (canvas.width - w)/2, (canvas.height - h)/2, w, h);
            } else {
                ctx.fillStyle = '#050a10'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            
            // 全体オーバーレイ（暗転）
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)'; ctx.fillRect(0, 0, canvas.width, canvas.height);

            // hidden状態の場合はUIを描画しない（動画と暗転のみ）
            if (animState !== 'hidden') {
                drawWRCUI(now);
            }
            requestAnimationFrame(drawFrame);
        }

        function drawWRCUI(now) {
            const uiW = 1350; const uiH = 720;
            const startX = (canvas.width - uiW) / 2;
            const startY = (canvas.height - uiH) / 2;

            // ベース枠のフェード
            let globalAlpha = 1;
            if (animState === 'in') globalAlpha = Math.min(1, (now - animStartTime) / 300);
            else if (animState === 'out') {
                const elapsed = now - animStartTime;
                const totalOutDuration = (data.length * STAGGER) + SPEED;
                if (elapsed > totalOutDuration - 300) {
                    globalAlpha = Math.max(0, 1 - ((elapsed - (totalOutDuration - 300)) / 300));
                }
            }
            if (globalAlpha <= 0) return;
            
            ctx.globalAlpha = globalAlpha;
            ctx.fillStyle = 'rgba(5, 15, 35, 0.98)'; ctx.fillRect(startX, startY, uiW, uiH);
            ctx.fillStyle = '#FF4D00'; ctx.fillRect(startX, startY, 18, uiH);

            const contentX = startX + 50;
            let currentY = startY + 40;
            const rows = [{ type: 'header', title: document.getElementById('in-title').value }, ...data];

            rows.forEach((row, index) => {
                const delay = index * STAGGER;
                let progress = 0; // 0.0 〜 1.0

                if (animState === 'in') {
                    progress = easeOutCubic(Math.max(0, Math.min(1, (now - animStartTime - delay) / SPEED)));
                } else if (animState === 'out') {
                    progress = easeOutCubic(Math.max(0, Math.min(1, (now - animStartTime - delay) / SPEED)));
                } else if (animState === 'idle') {
                    progress = 1;
                }

                if (progress <= 0 && animState !== 'out') return;
                if (progress >= 1 && animState === 'out') return;

                const isHeader = row.type === 'header';
                const rowH = isHeader ? 125 : (row.type === 'day' ? 38 : 50);
                const rowMargin = isHeader ? 25 : (row.type === 'day' ? 15 : 8);
                const rowW = uiW - 100;

                ctx.save();
                
                // 【修正】左から右に消えるアニメーション (Anim Out)
                if (animState === 'in') {
                    ctx.beginPath(); ctx.rect(contentX, currentY, rowW * progress, rowH); ctx.clip();
                } else if (animState === 'out') {
                    // Out時は、クリップの「左端」が右に移動し、表示幅が縮む（＝左から右に消える）
                    ctx.beginPath(); ctx.rect(contentX + (rowW * progress), currentY, rowW * (1 - progress), rowH); ctx.clip();
                } else {
                    ctx.beginPath(); ctx.rect(contentX, currentY, rowW, rowH); ctx.clip();
                }

                // テキスト描画
                if (isHeader) {
                    ctx.fillStyle = '#FF4D00'; ctx.fillRect(contentX, currentY, rowW, rowH);
                    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.font = `bold 52px ${currentFont}`; 
                    ctx.fillText(row.title, contentX + rowW/2, currentY + rowH/2 - 10);
                    ctx.font = `bold 14px ${currentFont}`; ctx.letterSpacing = "5px"; 
                    ctx.fillText("SCHEDULE", contentX + rowW/2, currentY + rowH/2 + 28);
                    ctx.letterSpacing = "0px";
                } else {
                    ctx.fillStyle = 'rgba(0, 5, 15, 0.98)'; ctx.fillRect(contentX, currentY, rowW, rowH);
                    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
                    if (row.type === 'day') {
                        ctx.fillStyle = '#aaa'; ctx.font = `bold 14px ${currentFont}`; ctx.letterSpacing = "2px";
                        ctx.fillText(row.text, contentX + 45, currentY + rowH/2);
                        ctx.letterSpacing = "0px";
                    } else {
                        ctx.fillStyle = '#FF4D00'; ctx.font = `bold 22px ${currentFont}`; ctx.fillText(row.day, contentX + 45, currentY + rowH/2);
                        ctx.fillStyle = '#fff'; ctx.font = `bold 22px ${currentFont}`; ctx.fillText(row.time, contentX + 160, currentY + rowH/2);
                    }
                }
                ctx.restore();

                // ワイプバー (左から右へ流れる)
                if (progress > 0 && progress < 1) {
                    let wipeX = -rowW + (progress * rowW * 2); // 常に左から右へ
                    ctx.save();
                    ctx.beginPath(); ctx.rect(contentX, currentY, rowW, rowH); ctx.clip();
                    ctx.fillStyle = isHeader ? '#fff' : '#FF4D00';
                    ctx.fillRect(contentX + wipeX, currentY, rowW, rowH);
                    ctx.restore();
                }

                currentY += rowH + rowMargin;
            });
            ctx.globalAlpha = 1;
        }

        // --- 録画・書き出しシーケンス ---
        async function startExport() {
            if (isRecording) return;
            if (!bgVideo.src) { alert("背景動画(.mp4)をアップロードしてください。"); return; }

            const keepSec = parseInt(document.getElementById('keep-time').value, 10) || 5;
            const audioFile = document.getElementById('a-up').files[0];

            try {
                isRecording = true;
                document.getElementById('rec-button').disabled = true;
                document.getElementById('preview-button').disabled = true;
                document.getElementById('rec-progress-bar').style.width = "0%";
                document.getElementById('status-badge').style.display = 'flex';
                
                // Audio Context の準備 (フェードイン・アウト用)
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const dest = audioCtx.createMediaStreamDestination();
                const gainNode = audioCtx.createGain();
                gainNode.gain.value = 0; // 初期音量ゼロ
                gainNode.connect(dest);

                const canvasStream = canvas.captureStream(60);
                let exportAudio = null;

                // オーディオの読み込みとランダム再生位置の計算
                if (audioFile) {
                    exportAudio = new Audio(URL.createObjectURL(audioFile));
                    await new Promise((resolve) => {
                        exportAudio.onloadedmetadata = resolve;
                        exportAudio.onerror = resolve; // エラー時も進める
                    });
                    
                    if (exportAudio.duration) {
                        const animInTime = (data.length * STAGGER) + SPEED;
                        const animOutTime = (data.length * STAGGER) + SPEED;
                        const totalActiveSec = 5 + (animInTime/1000) + keepSec + (animOutTime/1000) + 5; // 全体の録画秒数
                        
                        // ランダムなスタート位置 (最低でも全体の秒数分は残るように)
                        const maxStart = Math.max(0, exportAudio.duration - totalActiveSec);
                        exportAudio.currentTime = Math.random() * maxStart;

                        const source = audioCtx.createMediaElementSource(exportAudio);
                        source.connect(gainNode);
                        dest.stream.getAudioTracks().forEach(t => canvasStream.addTrack(t));
                        exportAudio.play();
                    }
                }

                // ブラウザ対応フォーマットの判定（フルHD MP4/WebM対応）
                let mimeType = 'video/webm;codecs=vp9';
                let extension = 'webm';
                if (MediaRecorder.isTypeSupported('video/mp4')) {
                    mimeType = 'video/mp4'; extension = 'mp4';
                } else if (MediaRecorder.isTypeSupported('video/webm;codecs=h264')) {
                    mimeType = 'video/webm;codecs=h264'; extension = 'mp4';
                }

                const options = { mimeType: mimeType, videoBitsPerSecond: 18000000 };
                const recorder = new MediaRecorder(canvasStream, options);
                const chunks = [];
                recorder.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };

                recorder.onstop = () => {
                    document.getElementById('rec-text').innerText = "📦 SAVING...";
                    const blob = new Blob(chunks, { type: mimeType.split(';')[0] });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    const title = document.getElementById('in-title').value.replace(/\s+/g, '_') || 'WRC_Studio';
                    a.download = `${title}_1080p.${extension}`;
                    a.click();
                    
                    cleanupExport(audioCtx, exportAudio);
                };

                // ===== タイムライン・シーケンス実行 =====
                recorder.start();
                
                // 【フェーズ1】開始 5秒待機 (非表示)
                document.getElementById('status-text').innerText = "REC: WAIT 5s";
                animState = 'hidden';
                await runSequence(5000, 0, 15);

                // 【フェーズ2】Anim IN ＋ BGMフェードイン
                document.getElementById('status-text').innerText = "REC: ANIM IN";
                animState = 'in'; 
                animStartTime = performance.now();
                if (exportAudio && audioCtx.state === 'running') {
                    // 1.5秒かけて音量を0から1へ上げる
                    gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                    gainNode.gain.linearRampToValueAtTime(1, audioCtx.currentTime + 1.5);
                }
                const animInTime = (data.length * STAGGER) + SPEED;
                await runSequence(animInTime, 15, 30);

                // 【フェーズ3】UIキープ (指定秒数)
                document.getElementById('status-text').innerText = `REC: KEEP ${keepSec}s`;
                animState = 'idle';
                await runSequence(keepSec * 1000, 30, 70);

                // 【フェーズ4】Anim OUT ＋ BGMフェードアウト
                document.getElementById('status-text').innerText = "REC: ANIM OUT";
                animState = 'out'; 
                animStartTime = performance.now();
                if (exportAudio && audioCtx.state === 'running') {
                    // 1.5秒かけて音量を1から0へ下げる
                    gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                    gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.5);
                }
                const animOutTime = (data.length * STAGGER) + SPEED;
                await runSequence(animOutTime, 70, 85);

                // 【フェーズ5】終了 5秒待機 (非表示)
                document.getElementById('status-text').innerText = "REC: WAIT 5s";
                animState = 'hidden';
                await runSequence(5000, 85, 100);
                
                // 録画停止
                recorder.stop();

            } catch (err) {
                console.error(err); alert("エラーが発生しました。"); cleanupExport();
            }
        }

        // プログレスバー進行用
        function runSequence(duration, startPct, endPct) {
            return new Promise(resolve => {
                const sTime = performance.now();
                const t = setInterval(() => {
                    const p = Math.min(1, (performance.now() - sTime) / duration);
                    document.getElementById('rec-progress-bar').style.width = `${startPct + (endPct - startPct) * p}%`;
                    if (p >= 1) { clearInterval(t); resolve(); }
                }, 50);
            });
        }

        function cleanupExport(ctx, audioObj) {
            isRecording = false;
            document.getElementById('rec-button').disabled = false;
            document.getElementById('preview-button').disabled = false;
            document.getElementById('rec-text').innerText = "🔴 FULL HD EXPORT (.mp4)";
            document.getElementById('rec-progress-bar').style.width = "0%";
            document.getElementById('status-badge').style.display = 'none';
            animState = 'idle';
            if(ctx) ctx.close();
            if(audioObj) { audioObj.pause(); audioObj.src = ""; }
            requestRender();
        }

        // --- プレビュー機能 ---
        async function triggerPreview() {
            if(isRecording || !bgVideo.src) return;
            const keepSec = parseInt(document.getElementById('keep-time').value, 10) || 5;
            
            animState = 'hidden';
            requestRender();
            
            setTimeout(() => {
                if(isRecording) return;
                animState = 'in'; animStartTime = performance.now(); requestRender();
                
                const animInTime = (data.length * STAGGER) + SPEED;
                setTimeout(() => {
                    if(isRecording) return;
                    animState = 'idle'; requestRender();
                    
                    setTimeout(() => {
                        if(isRecording) return;
                        animState = 'out'; animStartTime = performance.now(); requestRender();
                        
                        const animOutTime = (data.length * STAGGER) + SPEED;
                        setTimeout(() => {
                            if(isRecording) return;
                            animState = 'hidden'; requestRender();
                            // プレビュー終了後、通常のidleに戻す
                            setTimeout(() => { if(!isRecording) { animState='idle'; requestRender();} }, 2000);
                        }, animOutTime + 200);

                    }, keepSec * 1000);

                }, animInTime + 200);

            }, 1000); // プレビュー時は1秒待機でスタート
        }

        function requestRender() { if(!isRecording) { drawFrame(performance.now()); } }

        // --- エディタ UI ---
        function moveRow(index, dir) {
            if (index + dir < 0 || index + dir >= data.length) return;
            const temp = data[index];
            data[index] = data[index + dir];
            data[index + dir] = temp;
            buildEditor(); requestRender();
        }

        function buildEditor() {
            const root = document.getElementById('rows-editor');
            root.innerHTML = data.map((item, i) => `<div class="editor-section" style="display:flex; gap:5px; align-items:center;">
                ${item.type === 'day' 
                    ? `<input type="text" value="${item.text}" oninput="data[${i}].text=this.value;requestRender()">` 
                    : `<input style="width:70px; text-align:center;" type="text" value="${item.day}" oninput="data[${i}].day=this.value;requestRender()"><input type="text" value="${item.time}" oninput="data[${i}].time=this.value;requestRender()">`}
                <div style="display:flex; flex-direction:column; gap:2px;">
                    <button class="btn-sm" onclick="moveRow(${i}, -1)">▲</button>
                    <button class="btn-sm" onclick="moveRow(${i}, 1)">▼</button>
                </div>
                <button onclick="data.splice(${i},1);buildEditor();requestRender();" style="background:#522; border:none; color:white; padding:10px 12px; border-radius:4px; cursor:pointer;">×</button>
            </div>`).join('');
        }
        function addRow(t) { data.push(t==='day' ? {type:'day', text:'NEW DATE'} : {type:'stage', day:'00:00', time:'New Stage'}); buildEditor(); requestRender(); }

        // --- ファイル入力処理 ---
        document.getElementById('v-up').onchange = e => { if(e.target.files[0]) bgVideo.src = URL.createObjectURL(e.target.files[0]); requestRender(); };
        
        // フォント処理 (読み込んだ瞬間に反映)
        document.getElementById('f-up').onchange = async e => { 
            const file = e.target.files[0];
            if(file) {
                const fontName = 'CustomFont_' + Date.now();
                const fontUrl = URL.createObjectURL(file);
                const font = new FontFace(fontName, `url(${fontUrl})`);
                await font.load();
                document.fonts.add(font);
                currentFont = `${fontName}, 'Arial Black', sans-serif`;
                requestRender();
            }
        };

        window.addEventListener('resize', resizeCanvas);
        buildEditor();
        resizeCanvas();
        requestAnimationFrame(drawFrame);
    </script>
</body>
</html>
